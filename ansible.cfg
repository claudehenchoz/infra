[defaults]
# Ansible looks here for roles relative to the playbook.
roles_path = ./roles
# Don't pollute /etc with retry files on a managed box.
retry_files_enabled = False
# Speed up runs on tiny boxes.
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /var/cache/ansible-facts
fact_caching_timeout = 86400
# Pull mode: localhost only, no SSH.
inventory = ./inventory
