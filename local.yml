---
# This is the entry point that ansible-pull executes on every host.
# `connection: local` means tasks run against the box itself, not over SSH.
- name: Baseline configuration for all VPSes
  hosts: localhost
  connection: local
  become: true

  # Only gather the fact subsets we actually use:
  #   - network → ansible_facts['fqdn']
  #   - hardware (minimal) → ansible_facts['hostname'] comes from `min` implicitly via the default subset,
  #     so we keep `min` and exclude everything else.
  #   - pkg_mgr → cross-distro branch in tasks
  #   - os_family → sshd handler service name
  #
  # `!all` removes the heavy stuff (mounts, devices, virtual, dmi, lvm, …),
  # then we additively re-enable just what we need. On a tiny VPS this cuts
  # fact-gathering time by ~70%.
  gather_facts: true
  gather_subset:
    - "!all"
    - "!min"
    - "network"
    - "pkg_mgr"

  pre_tasks:
    # Pull mode targets `localhost`, so Ansible does NOT auto-load host_vars
    # by the box's real hostname. We do it manually: if a file matching this
    # box's FQDN exists in host_vars/, merge it into the play's vars.
    - name: Load per-host overrides if they exist
      include_vars: "{{ item }}"
      with_first_found:
        - files:
            - "host_vars/{{ ansible_facts['fqdn'] }}.yml"
            - "host_vars/{{ ansible_facts['hostname'] }}.yml"
          skip: true

  roles:
    - baseline
